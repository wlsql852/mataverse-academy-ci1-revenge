name: Build and Release Docker Image
on:
  push:
    branches:
      - main
env:
  REGISTRY: ghcr.io

jobs:
  tagging:
    name: tagging 수행
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{steps.tag_version.outputs.new_version}}

    steps:
      - uses: actions/checkout@v6

      - name: 버저닝 및 태깅
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}

  build-image:
    name: 도커 이미지 빌드
    runs-on: ubuntu-latest
    needs:
      - tagging

    # 깃허브 액션에서 빌드하는 방식
    steps:
      - name: 리포지토리로 체크아웃
        uses: actions/checkout@v6

      # 도커 이미지를 빌드
      # JDK 세팅 -> GRADLE 빌드 -> JAR
      - name: JDK 세팅
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      # 빌드 중에 전체 다 할선지, test는 건너뛸지 정할 수 있음
      # test는 빼겠다
      - name: Gradle 빌드
        uses: ./gradlew build -x test

      # build/libs/xxx.jar로 생성됨
      # 도커파일로 이미지를 빌드하려면 태그가 필요
      # docker hub에 push하기 위해 로그인 정보가 필요
      # github.actor : 깃허브 액션을 트리거한 유저 - 모두 권한을 가지고 있어야 해서 팀원 모두 owner로 설정
      - name: 레지스트리에 로그인
        uses: docker/login-action@v4
        with:
          registry: ${{env.REGISTRY}}
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}

      # 태그 형식을 type으로 줄 수 있음
      - name: 메타데이터 호출
        uses: docker/metadata-action@v6
        with:
          images: ${{env.REGISTRY}}/${{github.actor}}/${{github.repository}}
          tags:
            type=sha
            type=raw,value=${{needs.tagging.outputs.tag_name}}
            type=raw,value=latest  # 최신 버전에 latest를 계속 넣겠다(기존 latest는 사라짐)

      - name: 빌드 및 이미지 푸쉬
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{steps.meta.outputs.tags}}